<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Space Trader - Encounter Editor</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <style>
         body { font-family: 'Courier New', Courier, monospace; background: #f0f0f0; margin: 0; height: 100vh; overflow: hidden; }
         .panel { background: #ffffff; border: 2px solid #000; display: flex; flex-direction: column; }
         .btn { border: 2px solid #000; padding: 10px 8px; background: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; text-align: center; transition: all 0.1s; }
         .btn:hover:not(:disabled) { background: #e5e7eb; }
         .btn:active:not(:disabled) { background: #000; color: #fff; }
         .btn:disabled { opacity: 0.5; cursor: not-allowed; border-style: dashed; }
         input[type="text"], input[type="number"], textarea { border: 1px solid #000; padding: 6px; width: 100%; font-family: inherit; box-sizing: border-box; }
         .list-item { padding: 8px; border: 1px solid #ddd; cursor: pointer; margin-bottom: 4px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
         .list-item:hover { background: #f9fafb; }
         .list-item.active { background: #000; color: #fff; border-color: #000; }
      </style>
   </head>
   <body class="flex p-2 gap-2 h-screen">
      <div class="panel w-1/4 p-4 shrink-0 overflow-y-auto">
         <h2 class="font-bold text-xl uppercase border-b-2 border-black pb-2 mb-4">1. Data Connection</h2>
         <div id="connection-status" class="p-2 mb-2 bg-red-100 border border-red-500 text-xs font-bold text-center uppercase">
            Not Connected
         </div>
         <button class="btn bg-blue-100 w-full mb-2 text-sm" onclick="connectFile()">Connect data.js</button>
         <button class="btn bg-green-100 w-full mb-6 text-sm" id="btn-save" onclick="saveToFile()" disabled>Save Changes</button>
         <div class="flex justify-between items-end border-b-2 border-black pb-2 mb-4">
            <h2 class="font-bold text-xl uppercase">2. Encounters</h2>
            <button class="btn !p-1 text-xs bg-yellow-100" id="btn-add-enc" onclick="addEncounter()" disabled>+ ADD</button>
         </div>
         <div id="encounters-list" class="space-y-1"></div>
      </div>
      <div class="panel w-1/4 p-4 shrink-0 overflow-y-auto">
         <div class="flex justify-between items-end border-b-2 border-black pb-2 mb-4">
            <h2 class="font-bold text-xl uppercase">3. Nodes</h2>
            <button class="btn !p-1 text-xs bg-yellow-100" id="btn-add-node" onclick="addNode()" disabled>+ ADD NODE</button>
         </div>
         <div id="encounter-settings" class="mb-6 hidden bg-gray-50 p-2 border border-gray-300">
            <div class="flex justify-between items-center border-b border-gray-300 pb-1 mb-2">
                <h3 class="text-xs font-bold uppercase">Encounter Settings</h3>
                <button class="text-red-600 font-bold hover:underline text-[10px] uppercase" onclick="deleteEncounter()">DELETE ENCOUNTER</button>
            </div>
            <label class="block text-[10px] font-bold uppercase">Character Image</label>
            <div class="flex gap-1 mb-2">
                <input type="text" id="enc-image" class="text-xs flex-grow" placeholder="e.g. portrait.png" oninput="updateEncounterProp('image', this.value)">
                <button class="btn !p-1 !mb-0 text-[10px] bg-purple-100" onclick="document.getElementById('enc-image').value='random'; updateEncounterProp('image', 'random')">RANDOM</button>
            </div>
            <div class="flex gap-2">
               <div class="flex-1">
                  <label class="block text-[10px] font-bold uppercase">Requires Flag</label>
                  <input type="text" id="enc-req-flag" class="text-xs" oninput="updateEncounterProp('requiresFlag', this.value)">
               </div>
               <div class="flex-1">
                  <label class="block text-[10px] font-bold uppercase">Hides on Flag</label>
                  <input type="text" id="enc-hide-flag" class="text-xs" oninput="updateEncounterProp('hidesOnFlag', this.value)">
               </div>
            </div>
         </div>
         <div id="nodes-list" class="space-y-1"></div>
      </div>
      <div class="panel w-2/4 p-4 overflow-y-auto bg-gray-50" id="editor-panel">
         <div class="text-gray-500 italic text-center mt-20">Select an encounter and a node to start editing.</div>
      </div>
      <script>
         let interactions = {};
         let filePrefix = ""; 
         let fileSuffix = ""; 
         let fileHandle = null; 
         
         let selEnc = null;
         let selNode = null;
         
         // --- SAFE STRING HELPERS ---
         function escapeJS(str) {
             return (str || "").toString().replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '');
         }
         
         function escapeHTML(str) {
             return (str || "").toString().replace(/"/g, '&quot;');
         }
         
         // --- FILE PARSING & SAVING ---
         
         async function connectFile() {
             try {
                 [fileHandle] = await window.showOpenFilePicker({ types: [{ accept: { 'text/javascript': ['.js'] } }] });
                 const file = await fileHandle.getFile();
                 let text = await file.text();
         
                 // Find where interactions start and end
                 const startMarker = "const interactions = ";
                 const endMarker = "// ==========================================\n// COMMODITIES";
                 
                 let p1 = text.indexOf(startMarker);
                 let p2 = text.indexOf(endMarker);
         
                 if (p1 === -1 || p2 === -1) return alert("Could not find interactions block or commodities marker in file.");
         
                 filePrefix = text.substring(0, p1 + startMarker.length);
                 let interText = text.substring(p1 + startMarker.length, p2).trim();
                 if (interText.endsWith(";")) interText = interText.slice(0, -1);
                 fileSuffix = "\n\n" + endMarker + text.substring(p2 + endMarker.length);
         
                 interactions = new Function("return " + interText)();
         
                 document.getElementById('connection-status').innerText = `CONNECTED: ${file.name}`;
                 document.getElementById('connection-status').classList.replace('bg-red-100', 'bg-green-100');
                 document.getElementById('connection-status').classList.replace('border-red-500', 'border-green-500');
                 
                 document.getElementById('btn-save').disabled = false;
                 document.getElementById('btn-add-enc').disabled = false;
         
                 renderEncounters();
         
             } catch (err) {
                 if (err.name !== 'AbortError') alert("Connection failed. Make sure you are using Chrome/Edge.");
             }
         }
         
         async function saveToFile() {
             if (!fileHandle) return;
             const btn = document.getElementById("btn-save");
             btn.innerText = "SAVING...";
         
             try {
                 let out = filePrefix + stringifyInteractions(interactions) + fileSuffix;
                 
                 const writable = await fileHandle.createWritable();
                 await writable.write(out);
                 await writable.close();
         
                 btn.innerText = "SAVED!";
                 btn.classList.add("bg-black", "text-white");
             } catch (err) {
                 console.error(err);
                 btn.innerText = "FAILED!";
                 btn.classList.add("bg-red-500", "text-white");
             }
             setTimeout(() => { btn.innerText = "Save Changes"; btn.classList.remove("bg-black", "text-white", "bg-red-500"); }, 2000);
         }
         
         function stringifyInteractions(obj) {
             let out = "{\n";
             const keys = Object.keys(obj);
             keys.forEach((k, i) => {
                 const enc = obj[k];
                 out += `    "${k}": {\n`;
                 if (enc.requiresFlag) out += `        requiresFlag: "${escapeJS(enc.requiresFlag).trim()}",\n`;
                 if (enc.hidesOnFlag) out += `        hidesOnFlag: "${escapeJS(enc.hidesOnFlag).trim()}",\n`;
                 
                 if (enc.image) {
                     // Check if it's already an array in memory, or a string
                     let imgStr = Array.isArray(enc.image) ? enc.image.join(',') : enc.image;
                     
                     if (imgStr.includes(',')) {
                         // Split by comma, trim spaces, and wrap each item in quotes
                         let imgArr = imgStr.split(',').map(s => `"${escapeJS(s.trim())}"`).join(', ');
                         out += `        image: [${imgArr}],\n`;
                     } else {
                         // Save normally as a single string
                         out += `        image: "${escapeJS(imgStr).trim()}",\n`;
                     }
                 }
                 
                 out += `        dialogue: {\n`;
                 const dKeys = Object.keys(enc.dialogue || {});
                 dKeys.forEach((dk, j) => {
                     const node = enc.dialogue[dk];
                     out += `            "${dk}": {\n`;
                     
                     out += `                text: "${escapeJS(node.text)}",\n`;
                     
                     if (node.generateTaxiJobs) {
                         out += `                generateTaxiJobs: true,\n`;
                         if (node.taxiJobCount) out += `                taxiJobCount: ${node.taxiJobCount},\n`;
                         if (node.taxiMaxDistance) out += `                taxiMaxDistance: ${node.taxiMaxDistance},\n`;
                     }
                     
                     out += `                options: [\n`;
                     
                     (node.options || []).forEach((opt, oIdx) => {
                         let optStr = `                    { text: "${escapeJS(opt.text)}", nextNode: "${escapeJS(opt.nextNode) || 'leave'}"`;
                         if (opt.credits) optStr += `, credits: ${opt.credits}`;
                         if (opt.setFlag) optStr += `, setFlag: "${escapeJS(opt.setFlag).trim()}"`;
                         if (opt.clearFlag) optStr += `, clearFlag: "${escapeJS(opt.clearFlag).trim()}"`;
                         if (opt.requiresFlag) optStr += `, requiresFlag: "${escapeJS(opt.requiresFlag).trim()}"`;
                         if (opt.hidesOnFlag) optStr += `, hidesOnFlag: "${escapeJS(opt.hidesOnFlag).trim()}"`;
                         if (opt.startTask) optStr += `, startTask: "${escapeJS(opt.startTask).trim()}"`;
                         if (opt.completeTask) optStr += `, completeTask: "${escapeJS(opt.completeTask).trim()}"`;
                         
                        // --- UPDATED: Saves the Taxi Pickup and Dropoff flags! ---
                         if (opt.completePickup) optStr += `, completePickup: true`;
                         if (opt.completeTaxi) optStr += `, completeTaxi: true`;
                         if (opt.startCombat) optStr += `, startCombat: true`;
                         
                         optStr += ` }`;
                         
                         if (oIdx < node.options.length - 1) optStr += `,`;
                         out += optStr + `\n`;
                     });
                     out += `                ]\n`;
                     out += `            }`;
                     if (j < dKeys.length - 1) out += `,`;
                     out += `\n`;
                 });
                 out += `        }\n`;
                 out += `    }`;
                 if (i < keys.length - 1) out += `,`;
                 out += `\n`;
             });
             out += `\n};`;
             return out;
         }
         
         // --- UI RENDERING ---
         
         function renderEncounters() {
             let html = '';
             Object.keys(interactions).forEach(k => {
                 const isActive = selEnc === k ? 'active' : '';
                 html += `<div class="list-item ${isActive}" onclick="selectEncounter('${k}')">${k}</div>`;
             });
             document.getElementById('encounters-list').innerHTML = html;
             
             if (!selEnc || !interactions[selEnc]) {
                 document.getElementById('encounter-settings').classList.add('hidden');
                 document.getElementById('btn-add-node').disabled = true;
                 document.getElementById('nodes-list').innerHTML = '';
                 document.getElementById('editor-panel').innerHTML = `<div class="text-gray-500 italic text-center mt-20">Select an encounter to start editing.</div>`;
             }
         }
         
         function selectEncounter(k) {
             selEnc = k;
             selNode = null;
             
             // Populate settings
             document.getElementById('encounter-settings').classList.remove('hidden');
             document.getElementById('btn-add-node').disabled = false;
             document.getElementById('enc-image').value = interactions[k].image || '';
             document.getElementById('enc-req-flag').value = interactions[k].requiresFlag || '';
             document.getElementById('enc-hide-flag').value = interactions[k].hidesOnFlag || '';
         
             renderEncounters(); // Refresh active state
             renderNodes();
         }
         
         function renderNodes() {
             if (!selEnc || !interactions[selEnc]) return;
             let html = '';
             const enc = interactions[selEnc];
             
             Object.keys(enc.dialogue).forEach(k => {
                 const isActive = selNode === k ? 'active' : '';
                 html += `<div class="list-item ${isActive}" onclick="selectNode('${k}')">
                     <span>${k}</span>
                     <button class="text-red-500 font-bold hover:text-red-700" onclick="deleteNode('${k}', event)">X</button>
                 </div>`;
             });
             document.getElementById('nodes-list').innerHTML = html;
             renderEditor();
         }
         
         function selectNode(k) {
             selNode = k;
             renderNodes(); // Refresh active state
         }
         
         function renderEditor() {
             const panel = document.getElementById('editor-panel');
             if (!selEnc || !selNode) {
                 panel.innerHTML = `<div class="text-gray-500 italic text-center mt-20">Select a node to edit.</div>`;
                 return;
             }
         
             const node = interactions[selEnc].dialogue[selNode];
             
             let html = `
                 <div class="flex justify-between items-end border-b-2 border-black pb-2 mb-4">
                     <h2 class="font-bold text-2xl uppercase">Node: ${selNode}</h2>
                 </div>
         
                 <div class="flex items-center gap-2 mb-2 bg-gray-200 p-2 border border-gray-400">
                     <input type="checkbox" id="node-taxi" ${node.generateTaxiJobs ? 'checked' : ''} onchange="toggleTaxiJobs(this.checked)">
                     <label for="node-taxi" class="text-xs font-bold uppercase text-blue-800">Generate Taxi Job Board Here</label>
                 </div>
                 
                 ${node.generateTaxiJobs ? `
                 <div class="flex gap-4 mb-4 p-3 bg-blue-50 border-2 border-blue-200">
                     <div>
                         <label class="block text-[10px] font-bold uppercase mb-1">Max Distance (LY)</label>
                         <input type="number" value="${node.taxiMaxDistance || 150}" oninput="updateNodeProp('taxiMaxDistance', parseInt(this.value) || 0)">
                     </div>
                     <div>
                         <label class="block text-[10px] font-bold uppercase mb-1">Number of Jobs</label>
                         <input type="number" value="${node.taxiJobCount || 3}" oninput="updateNodeProp('taxiJobCount', parseInt(this.value) || 0)">
                     </div>
                 </div>
                 ` : ''}
         
                 <label class="block text-xs font-bold uppercase mb-1">NPC Dialogue (HTML allowed, e.g., &lt;br&gt; or &lt;i&gt;)</label>
                 <textarea class="w-full h-32 mb-6 shrink-0" oninput="updateNodeProp('text', this.value)">${node.text || ''}</textarea>
         
                 <div class="flex justify-between items-center border-b-2 border-black pb-2 mb-4 shrink-0">
                     <h3 class="font-bold text-xl uppercase">Player Options</h3>
                     <button class="btn !p-1 text-xs bg-green-100" onclick="addOption()">+ ADD OPTION</button>
                 </div>
                 
                 <div class="space-y-4 shrink-0 pb-8">
             `;
         
             (node.options || []).forEach((opt, i) => {
                 html += `
                 <div class="bg-white border-2 border-black p-3 relative">
                     <button class="absolute top-2 right-2 text-red-500 font-bold" onclick="deleteOption(${i})">DELETE</button>
                     
                     <div class="mb-3 pr-16">
                         <label class="block text-[10px] font-bold uppercase text-blue-600 mb-1">Button Text</label>
                         <input type="text" value="${escapeHTML(opt.text)}" oninput="updateOpt(${i}, 'text', this.value)">
                     </div>
         
                     <div class="grid grid-cols-2 gap-3 mb-3">
                         <div>
                             <label class="block text-[10px] font-bold uppercase text-blue-600 mb-1">Target Node (or 'leave')</label>
                             <input type="text" value="${escapeHTML(opt.nextNode)}" oninput="updateOpt(${i}, 'nextNode', this.value)">
                         </div>
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Credit Change (+ or -)</label>
                             <input type="number" value="${opt.credits || ''}" oninput="updateOpt(${i}, 'credits', this.value)">
                         </div>
                     </div>
         
                     <div class="grid grid-cols-2 gap-3 mb-3 bg-gray-100 p-2 border border-gray-300">
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Give Flag</label>
                             <input type="text" class="text-xs" value="${escapeHTML(opt.setFlag)}" oninput="updateOpt(${i}, 'setFlag', this.value)">
                         </div>
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Remove Flag</label>
                             <input type="text" class="text-xs" value="${escapeHTML(opt.clearFlag)}" oninput="updateOpt(${i}, 'clearFlag', this.value)">
                         </div>
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Requires Flag to See</label>
                             <input type="text" class="text-xs" value="${escapeHTML(opt.requiresFlag)}" oninput="updateOpt(${i}, 'requiresFlag', this.value)">
                         </div>
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Hide if Flag Owned</label>
                             <input type="text" class="text-xs" value="${escapeHTML(opt.hidesOnFlag)}" oninput="updateOpt(${i}, 'hidesOnFlag', this.value)">
                         </div>
                     </div>
         
                     <div class="grid grid-cols-2 gap-3 bg-yellow-50 p-2 border border-yellow-300">
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Start Task (Task ID)</label>
                             <input type="text" class="text-xs" value="${escapeHTML(opt.startTask)}" oninput="updateOpt(${i}, 'startTask', this.value)">
                         </div>
                         <div>
                             <label class="block text-[10px] font-bold uppercase mb-1">Complete Task (Task ID)</label>
                             <input type="text" class="text-xs" value="${escapeHTML(opt.completeTask)}" oninput="updateOpt(${i}, 'completeTask', this.value)">
                         </div>
                     </div>
                     
                     <div class="grid grid-cols-3 gap-3 bg-blue-50 p-2 border border-blue-300 mt-3">
                         <div class="flex items-center gap-2">
                             <input type="checkbox" ${opt.completePickup ? 'checked' : ''} onchange="updateOpt(${i}, 'completePickup', this.checked)">
                             <label class="text-[10px] font-bold uppercase mb-0">Completes Taxi Pickup</label>
                         </div>
                         <div class="flex items-center gap-2">
                             <input type="checkbox" ${opt.completeTaxi ? 'checked' : ''} onchange="updateOpt(${i}, 'completeTaxi', this.checked)">
                             <label class="text-[10px] font-bold uppercase mb-0">Completes Taxi Dropoff</label>
                         </div>
                         <div class="flex items-center gap-2">
                             <input type="checkbox" ${opt.startCombat ? 'checked' : ''} onchange="updateOpt(${i}, 'startCombat', this.checked)">
                             <label class="text-[10px] font-bold uppercase text-red-600 mb-0">Initiates Combat</label>
                         </div>
                     </div>
                 </div>`;
             });
         
             html += `</div>`;
             panel.innerHTML = html;
         }
         
         // --- DATA MUTATIONS ---
         
         function addEncounter() {
             const name = prompt("Enter new encounter name:");
             if (!name || interactions[name]) return;
             interactions[name] = { image: "default.png", dialogue: { "start": { text: "Hello.", options: [{ text: "[Leave]", nextNode: "leave" }] } } };
             selEnc = name;
             renderEncounters();
             selectEncounter(name);
         }
         
         function deleteEncounter() {
             if (!confirm(`Delete ${selEnc}?`)) return;
             delete interactions[selEnc];
             selEnc = null;
             renderEncounters();
         }
         
         function updateEncounterProp(key, val) {
             if (!selEnc) return;
             if (val === '') delete interactions[selEnc][key];
             else interactions[selEnc][key] = val;
         }
         
         function addNode() {
             if (!selEnc) return;
             const name = prompt("Enter new node name:");
             if (!name || interactions[selEnc].dialogue[name]) return;
             interactions[selEnc].dialogue[name] = { text: "New node text.", options: [] };
             selectNode(name);
         }
         
         function deleteNode(k, e) {
             e.stopPropagation();
             if (!confirm(`Delete node ${k}?`)) return;
             delete interactions[selEnc].dialogue[k];
             if (selNode === k) selNode = null;
             renderNodes();
         }
         
         function updateNodeProp(key, val) {
             if (val === false || val === '') delete interactions[selEnc].dialogue[selNode][key];
             else interactions[selEnc].dialogue[selNode][key] = val;
         }
         
         function toggleTaxiJobs(checked) {
             if (checked) {
                 interactions[selEnc].dialogue[selNode].generateTaxiJobs = true;
                 interactions[selEnc].dialogue[selNode].taxiJobCount = 3;
                 interactions[selEnc].dialogue[selNode].taxiMaxDistance = 150;
             } else {
                 delete interactions[selEnc].dialogue[selNode].generateTaxiJobs;
                 delete interactions[selEnc].dialogue[selNode].taxiJobCount;
                 delete interactions[selEnc].dialogue[selNode].taxiMaxDistance;
             }
             renderEditor(); // Force the screen to redraw so the inputs appear/disappear!
         }
         
         function addOption() {
             interactions[selEnc].dialogue[selNode].options.push({ text: "New Option", nextNode: "leave" });
             renderEditor();
         }
         
         function deleteOption(idx) {
             interactions[selEnc].dialogue[selNode].options.splice(idx, 1);
             renderEditor();
         }
         
         function updateOpt(idx, key, val) {
             if (key === 'credits') val = parseInt(val) || 0;
             if (val === '' || val === 0 || val === false) delete interactions[selEnc].dialogue[selNode].options[idx][key];
             else interactions[selEnc].dialogue[selNode].options[idx][key] = val;
         }
      </script>
   </body>
</html>
