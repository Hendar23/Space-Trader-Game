<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Trader - Ship Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #f0f0f0; margin: 0; height: 100vh; overflow: hidden; }
        .panel { background: #ffffff; border: 2px solid #000; display: flex; flex-direction: column; }
        .btn { border: 2px solid #000; padding: 10px 8px; background: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; text-align: center; transition: all 0.1s; }
        .btn:hover:not(:disabled) { background: #e5e7eb; }
        .btn:active:not(:disabled) { background: #000; color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; border-style: dashed; }
        input[type="text"], input[type="number"], textarea, select { border: 1px solid #000; padding: 6px; width: 100%; font-family: inherit; box-sizing: border-box; }
        
        .list-item { padding: 8px; border: 1px solid #ddd; cursor: pointer; margin-bottom: 4px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .list-item:hover { background: #f9fafb; }
        .list-item.active { background: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body class="flex p-2 gap-2 h-screen">

    <div class="panel w-1/4 p-4 shrink-0 overflow-y-auto">
        <h2 class="font-bold text-xl uppercase border-b-2 border-black pb-2 mb-4">1. Data Connection</h2>
        
        <div id="connection-status" class="p-2 mb-2 bg-red-100 border border-red-500 text-xs font-bold text-center uppercase">
            Not Connected
        </div>
        <button class="btn bg-blue-100 w-full mb-2 text-sm" onclick="connectFile()">Connect data.js</button>
        <button class="btn bg-green-100 w-full mb-6 text-sm" id="btn-save" onclick="saveToFile()" disabled>Save Changes</button>

        <h2 class="font-bold text-xl uppercase border-b-2 border-black pb-2 mb-4">2. Categories</h2>
        <div id="categories-list" class="space-y-1">
            <div class="list-item active" onclick="selectCategory('shipHulls')" id="cat-shipHulls">Ship Hulls</div>
            <div class="list-item" onclick="selectCategory('warpDrive')" id="cat-warpDrive">Warp Drives</div>
            <div class="list-item" onclick="selectCategory('armour')" id="cat-armour">Armor</div>
            <div class="list-item" onclick="selectCategory('cargoBay')" id="cat-cargoBay">Cargo Bays</div>
            <div class="list-item" onclick="selectCategory('thrusters')" id="cat-thrusters">Thrusters</div>
            <div class="list-item" onclick="selectCategory('weapons')" id="cat-weapons">Weapons</div>
            <div class="list-item" onclick="selectCategory('modules')" id="cat-modules">Modules</div>
        </div>
    </div>

    <div class="panel w-1/4 p-4 shrink-0 overflow-y-auto">
        <div class="flex justify-between items-end border-b-2 border-black pb-2 mb-4">
            <h2 class="font-bold text-xl uppercase">3. Items</h2>
            <button class="btn !p-1 text-xs bg-yellow-100" id="btn-add-item" onclick="addItem()" disabled>+ ADD ITEM</button>
        </div>
        
        <div id="items-list" class="space-y-1"></div>
    </div>

    <div class="panel w-2/4 p-4 overflow-y-auto bg-gray-50" id="editor-panel">
        <div class="text-gray-500 italic text-center mt-20">Connect data.js and select an item to start editing.</div>
    </div>

    <script>
        let shipHullsData = {};
        let equipmentData = {};
        let filePrefix = ""; 
        let fileSuffix = ""; 
        let fileHandle = null; 

        let selCat = 'shipHulls';
        let selItem = null;

        const sizes = ["Tiny", "Small", "Medium", "Large", "Huge"];
        const moduleStats = ["jumpRange", "armour", "cargo", "handling", "offensive"];

        function escapeJS(str) { return (str || "").toString().replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, ''); }
        function escapeHTML(str) { return (str || "").toString().replace(/"/g, '&quot;'); }

        async function connectFile() {
            try {
                [fileHandle] = await window.showOpenFilePicker({ types: [{ accept: { 'text/javascript': ['.js'] } }] });
                const file = await fileHandle.getFile();
                let text = await file.text();

                const startMarker = "const shipHulls = ";
                const endMarker = "// ==========================================\n// PROCEDURAL GENERATION DATA";
                
                let p1 = text.indexOf(startMarker);
                let p2 = text.indexOf(endMarker);

                if (p1 === -1 || p2 === -1) return alert("Could not find shipHulls block or Procedural marker in file.");

                filePrefix = text.substring(0, p1);
                let evalText = text.substring(p1, p2);
                fileSuffix = text.substring(p2);

                const parsed = new Function(evalText + "\n return { shipHulls: shipHulls, equipment: equipment };")();
                shipHullsData = parsed.shipHulls;
                equipmentData = parsed.equipment;

                document.getElementById('connection-status').innerText = `CONNECTED: ${file.name}`;
                document.getElementById('connection-status').classList.replace('bg-red-100', 'bg-green-100');
                document.getElementById('connection-status').classList.replace('border-red-500', 'border-green-500');
                
                document.getElementById('btn-save').disabled = false;
                document.getElementById('btn-add-item').disabled = false;

                renderItems();

            } catch (err) {
                if (err.name !== 'AbortError') alert("Connection failed. Make sure you are using Chrome/Edge.");
            }
        }

        async function saveToFile() {
            if (!fileHandle) return;
            const btn = document.getElementById("btn-save");
            btn.innerText = "SAVING...";

            try {
                let out = filePrefix + stringifyData() + "\n" + fileSuffix;
                
                const writable = await fileHandle.createWritable();
                await writable.write(out);
                await writable.close();

                btn.innerText = "SAVED!";
                btn.classList.add("bg-black", "text-white");
            } catch (err) {
                console.error(err);
                btn.innerText = "FAILED!";
                btn.classList.add("bg-red-500", "text-white");
            }
            setTimeout(() => { btn.innerText = "Save Changes"; btn.classList.remove("bg-black", "text-white", "bg-red-500"); }, 2000);
        }

        function stringifyData() {
            let out = "const shipHulls = {\n";
            const hullKeys = Object.keys(shipHullsData);
            hullKeys.forEach((k, i) => {
                const s = shipHullsData[k];
                out += `    "${escapeJS(k)}": {\n`;
                out += `        name: "${escapeJS(s.name)}",\n`;
		if (s.image) {
                    out += `        image: "${escapeJS(s.image)}",\n`;
                }
                out += `        size: "${escapeJS(s.size)}",\n`;
                out += `        description: "${escapeJS(s.description)}",\n`;
                out += `        multipliers: {\n`;
                out += `            jumpRange: ${s.multipliers.jumpRange},\n`;
                out += `            armour: ${s.multipliers.armour},\n`; // <-- FIXED
                out += `            cargo: ${s.multipliers.cargo},\n`;
                out += `            handling: ${s.multipliers.handling},\n`;
                out += `            offensive: ${s.multipliers.offensive}\n`;
                out += `        },\n`;
                out += `        coreSlots: {\n`;
                out += `            warpDrive: ${s.coreSlots.warpDrive},\n`;
                out += `            armour: ${s.coreSlots.armour},\n`; // <-- FIXED
                out += `            cargoBay: ${s.coreSlots.cargoBay},\n`;
                out += `            thrusters: ${s.coreSlots.thrusters},\n`;
                out += `            weapons: ${s.coreSlots.weapons}\n`;
                out += `        },\n`;
                if (i < hullKeys.length - 1) out += ",";
                out += "\n";
            });
            out += "};\n\nconst equipment = {\n";

            const eqCats = ["warpDrive", "armour", "cargoBay", "thrusters", "weapons", "modules"];
            eqCats.forEach((cat, cIdx) => {
                out += `    ${cat}: {\n`;
                const items = Object.keys(equipmentData[cat] || {});
                items.forEach((k, i) => {
                    const eq = equipmentData[cat][k];
                    if (cat === "modules") {
                        out += `        "${escapeJS(k)}": { name: "${escapeJS(eq.name)}", size: "${escapeJS(eq.size)}", type: "module", stat: "${escapeJS(eq.stat)}", flatBonus: ${eq.flatBonus}, description: "${escapeJS(eq.description)}" }`;
                    } else {
                        out += `        "${escapeJS(k)}": { name: "${escapeJS(eq.name)}", size: "${escapeJS(eq.size)}", type: "${escapeJS(eq.type)}", baseValue: ${eq.baseValue}, description: "${escapeJS(eq.description)}" }`;
                    }
                    if (i < items.length - 1) out += ",";
                    out += "\n";
                });
                out += `    }`;
                if (cIdx < eqCats.length - 1) out += ",\n";
                else out += "\n";
            });
            out += "};\n";
            return out;
        }

        function selectCategory(cat) {
            document.getElementById('cat-' + selCat).classList.remove('active');
            selCat = cat;
            document.getElementById('cat-' + selCat).classList.add('active');
            selItem = null;
            renderItems();
        }

        function renderItems() {
            if (!fileHandle) return;
            let html = '';
            
            const dataSource = selCat === 'shipHulls' ? shipHullsData : (equipmentData[selCat] || {});
            
            Object.keys(dataSource).forEach(k => {
                const isActive = selItem === k ? 'active' : '';
                html += `<div class="list-item ${isActive}" onclick="selectItem('${escapeJS(k)}')">
                    <span>${k}</span>
                    <button class="text-red-500 font-bold hover:text-red-700" onclick="deleteItem('${escapeJS(k)}', event)">X</button>
                </div>`;
            });
            document.getElementById('items-list').innerHTML = html;
            renderEditor();
        }

        function selectItem(k) {
            selItem = k;
            renderItems();
        }

        function addItem() {
            const name = prompt("Enter new item ID (Must be unique):");
            if (!name) return;
            
            if (selCat === 'shipHulls') {
                if (shipHullsData[name]) return alert("ID already exists.");
                shipHullsData[name] = { 
                    name: name, size: "Tiny", description: "New Ship", 
                    multipliers: { jumpRange: 1, armour: 1, cargo: 1, handling: 1, offensive: 1 },
                    coreSlots: { warpDrive: 1, armour: 1, cargoBay: 1, thrusters: 1, weapons: 1 },
                    modularSlots: 1 
                };
            } else if (selCat === 'modules') {
                if (equipmentData.modules[name]) return alert("ID already exists.");
                equipmentData.modules[name] = { name: name, size: "Tiny", type: "module", stat: "cargo", flatBonus: 5, description: "New Module" };
            } else {
                if (!equipmentData[selCat]) equipmentData[selCat] = {};
                if (equipmentData[selCat][name]) return alert("ID already exists.");
                equipmentData[selCat][name] = { name: name, size: "Tiny", type: selCat, baseValue: 10, description: "New Item" };
            }
            selectItem(name);
        }

        function deleteItem(k, e) {
            e.stopPropagation();
            if (!confirm(`Delete ${k}?`)) return;
            if (selCat === 'shipHulls') delete shipHullsData[k];
            else delete equipmentData[selCat][k];
            if (selItem === k) selItem = null;
            renderItems();
        }

        // Mutation Helpers
        function setHull(prop, val) { shipHullsData[selItem][prop] = val; }
        function setHullNest(parent, prop, val) { shipHullsData[selItem][parent][prop] = parseFloat(val) || 0; }
        function setEq(prop, val) { equipmentData[selCat][selItem][prop] = val; }
        function setEqNum(prop, val) { equipmentData[selCat][selItem][prop] = parseInt(val) || 0; }

        function renderEditor() {
            const panel = document.getElementById('editor-panel');
            if (!selItem) {
                panel.innerHTML = `<div class="text-gray-500 italic text-center mt-20">Select an item to edit.</div>`;
                return;
            }

            let html = `<h2 class="font-bold text-2xl uppercase border-b-2 border-black pb-2 mb-4">${selItem}</h2>`;

            if (selCat === 'shipHulls') {
                const hull = shipHullsData[selItem];
                html += `
                    <div class="grid grid-cols-2 gap-4 mb-2">
                        <div><label class="block text-xs font-bold uppercase mb-1">Display Name</label><input type="text" value="${escapeHTML(hull.name)}" oninput="setHull('name', this.value)"></div>
                        <div><label class="block text-xs font-bold uppercase mb-1">Size Class</label>
                            <select onchange="setHull('size', this.value)">${sizes.map(s => `<option value="${s}" ${hull.size === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-bold uppercase mb-1">Ship Image (Optional)</label>
                        <input type="text" placeholder="ship_weescow.png" value="${escapeHTML(hull.image || '')}" oninput="setHull('image', this.value)">
                    </div>

                    <label class="block text-xs font-bold uppercase mb-1">Description</label>
                    <textarea class="h-16 mb-4" oninput="setHull('description', this.value)">${escapeHTML(hull.description)}</textarea>

                    <h3 class="font-bold text-lg uppercase bg-black text-white p-2 mb-2">Stat Multipliers</h3>
                    <div class="grid grid-cols-3 gap-2 mb-6 bg-gray-200 p-2 border border-gray-400">
                        ${Object.keys(hull.multipliers).map(m => `
                            <div><label class="block text-[10px] font-bold uppercase mb-1">${m}</label><input type="number" step="0.1" value="${hull.multipliers[m]}" oninput="setHullNest('multipliers', '${m}', this.value)"></div>
                        `).join('')}
                    </div>

                    <h3 class="font-bold text-lg uppercase bg-black text-white p-2 mb-2">Core Slots</h3>
                    <div class="grid grid-cols-3 gap-2 mb-4 bg-gray-200 p-2 border border-gray-400">
                        ${Object.keys(hull.coreSlots).map(c => `
                            <div><label class="block text-[10px] font-bold uppercase mb-1">${c}</label><input type="number" value="${hull.coreSlots[c]}" oninput="setHullNest('coreSlots', '${c}', this.value)"></div>
                        `).join('')}
                    </div>

                    <div class="w-1/3 bg-blue-100 p-2 border border-blue-400">
                        <label class="block text-xs font-bold uppercase mb-1">Modular Slots</label>
                        <input type="number" value="${hull.modularSlots}" oninput="setHull('modularSlots', parseInt(this.value) || 0)">
                    </div>
                `;
            } else if (selCat === 'modules') {
                const mod = equipmentData.modules[selItem];
                html += `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="block text-xs font-bold uppercase mb-1">Display Name</label><input type="text" value="${escapeHTML(mod.name)}" oninput="setEq('name', this.value)"></div>
                        <div><label class="block text-xs font-bold uppercase mb-1">Size Class</label>
                            <select onchange="setEq('size', this.value)">${sizes.map(s => `<option value="${s}" ${mod.size === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4 bg-green-50 p-3 border border-green-300">
                        <div><label class="block text-xs font-bold uppercase mb-1 text-green-800">Target Stat</label>
                            <select onchange="setEq('stat', this.value)">${moduleStats.map(s => `<option value="${s}" ${mod.stat === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
                        </div>
                        <div><label class="block text-xs font-bold uppercase mb-1 text-green-800">Flat Bonus</label><input type="number" value="${mod.flatBonus}" oninput="setEqNum('flatBonus', this.value)"></div>
                    </div>
                    <label class="block text-xs font-bold uppercase mb-1">Description</label>
                    <textarea class="h-16" oninput="setEq('description', this.value)">${escapeHTML(mod.description)}</textarea>
                `;
            } else {
                const eq = equipmentData[selCat][selItem];
                html += `
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="block text-xs font-bold uppercase mb-1">Display Name</label><input type="text" value="${escapeHTML(eq.name)}" oninput="setEq('name', this.value)"></div>
                        <div><label class="block text-xs font-bold uppercase mb-1">Size Class</label>
                            <select onchange="setEq('size', this.value)">${sizes.map(s => `<option value="${s}" ${eq.size === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
                        </div>
                    </div>
                    <div class="w-1/2 mb-4 bg-yellow-50 p-3 border border-yellow-300">
                        <label class="block text-xs font-bold uppercase mb-1 text-yellow-800">Base Value (Stat)</label>
                        <input type="number" value="${eq.baseValue}" oninput="setEqNum('baseValue', this.value)">
                    </div>
                    <label class="block text-xs font-bold uppercase mb-1">Description</label>
                    <textarea class="h-16" oninput="setEq('description', this.value)">${escapeHTML(eq.description)}</textarea>
                `;
            }
            panel.innerHTML = html;
        }
    </script>
</body>
</html>
