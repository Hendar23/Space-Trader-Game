<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Trader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace;
            user-select: none; -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        .border-main { border: 2px solid #000000; }
        .btn { 
            border: 2px solid #000000; padding: 16px; background: #ffffff; color: #000000;
            font-weight: bold; text-align: center; width: 100%; display: block;
            margin-bottom: 8px; font-size: 24px; cursor: pointer;
        }
        .btn:active:not(:disabled) { background: #000000; color: #ffffff; }
        .btn:disabled { opacity: 0.3; border-style: dotted; cursor: not-allowed; }
        
        .tab-btn {
            flex: 1; padding: 14px 0; font-weight: bold; text-align: center;
            border-bottom: 2px solid #000; border-right: 2px solid #000;
            text-transform: uppercase; font-size: 20px; cursor: pointer;
        }
        .tab-btn:last-child { border-right: none; }
        .tab-active { background: #000000; color: #ffffff; }
        
        #star-map { width: 100%; height: 100%; background: #ffffff; touch-action: none; cursor: grab; }
        .progress-container { width: 80%; height: 32px; border: 2px solid #000000; margin-top: 16px; }
        #progress-bar { height: 100%; background: #000000; width: 0%; }

        .market-list-header {
            display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.5fr 1fr; gap: 4px;
            font-size: 18px; font-weight: bold; text-transform: uppercase;
            border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 8px; opacity: 0.6;
        }
        .market-item {
            display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.5fr 1fr; gap: 4px;
            align-items: center; font-size: 18px; font-weight: bold; text-transform: uppercase; margin-bottom: 12px;
        }
        .trade-btn { border: 2px solid black; padding: 10px 4px; font-weight: bold; font-size: 16px; text-align: center;}
        .trade-btn:active:not(:disabled) { background: black; color: white; }
        
        #travel-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 50;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
    <script src="data.js"></script>
</head>
<body class="flex flex-col h-screen max-h-screen">

    <div id="start-screen" class="p-4">
        <h1 class="text-6xl font-bold uppercase mb-12 tracking-widest text-center border-b-4 border-black pb-4">Working<br>Title</h1>
        <div class="w-full max-w-sm space-y-4">
            <button class="btn !text-2xl !py-6" onclick="startNewGame()">NEW GAME</button>
            <button id="btn-load-game" class="btn !text-2xl !py-6" onclick="loadGame()" disabled>LOAD GAME</button>
        </div>
    </div>

    <div class="bg-black text-white p-3 text-xl font-bold uppercase flex justify-between items-center shrink-0">
        <div>Cr: <span id="status-credits">1000</span></div>
        <div>Cgo: <span id="status-cargo">0</span>/<span id="status-cargo-max">20</span></div>
    </div>

    <div class="flex shrink-0 border-main border-t-0 border-l-0 border-r-0">
        <div class="tab-btn tab-active" onclick="switchTab('map')" id="btn-map">Map</div>
        <div class="tab-btn" onclick="switchTab('local')" id="btn-local">Local</div>
        <div class="tab-btn" onclick="switchTab('ship')" id="btn-ship">Ship</div>
        <div class="tab-btn" onclick="switchTab('player')" id="btn-player">Player</div>
        <div class="tab-btn" onclick="saveGame()" id="btn-save">Save</div>
    </div>

    <div id="main-content" class="flex-grow relative overflow-hidden flex flex-col p-4">
        <div id="tab-map" class="absolute inset-0 p-4 flex flex-col hidden">
            <div class="flex justify-between items-end mb-2 shrink-0">
                <p class="text-xl font-bold uppercase">Galaxy Map</p>
                <p class="text-xl font-bold uppercase">Range: <span id="map-range-val">---</span>ly</p>
            </div>
            <div class="border-main flex-grow overflow-hidden relative"><canvas id="star-map"></canvas></div>
        </div>
        <div id="tab-local" class="hidden absolute inset-0 p-4 flex flex-col overflow-y-auto"></div>
        <div id="tab-ship" class="hidden absolute inset-0 p-4 overflow-y-auto">
            <div class="mb-6 text-2xl font-bold uppercase space-y-2">
                <p>Class: Light Freighter</p>
                <p>Jump Drive: <span id="ship-range">100</span>ly</p>
                <p>Capacity: <span id="ship-cargo-current">0</span> / <span id="ship-cargo-total">20</span> SCU</p>
            </div>
            <h3 class="text-3xl font-bold mb-4 uppercase border-b border-black">Cargo Bay</h3>
            <div id="cargo-list" class="uppercase font-bold text-xl space-y-2"></div>
        </div>
        <div id="tab-player" class="hidden absolute inset-0 p-4 overflow-y-auto">
            <div class="uppercase font-bold text-2xl space-y-3">
                <p>Name: Unknown Pilot</p>
                <p>Rank: Harmless</p>
                <p>Net Worth: <span id="player-credits">1000</span> Credits</p>
            </div>
        </div>
    </div>

    <div id="travel-overlay">
        <h2 id="travel-text" class="animate-pulse text-5xl font-bold uppercase text-center px-4">WARP ACTIVE</h2>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <script>
        const drawScale = 4;
        let camera = { x: 0, y: 0, zoom: 1 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let dragThreshold = false;
        let initialPinchDistance = null;

        let player = { credits: 1000, cargo: {}, cargoMax: 20 };
        let currentSystem = null;
        let currentPoi = null; 
        let jumpRange = 100;
        let activeTab = 'map';
        let localView = 'menu'; 
        let currentMarketPrices = {}; // Tracks volatile system prices

        const canvas = document.getElementById('star-map');
        const ctx = canvas.getContext('2d');

       function randomizeMarket() {
    for (let item in commodities) {
        const comm = commodities[item];
        // Creates a random volatility modifier between 85% and 115%
        const volatility = 0.85 + (Math.random() * 0.30);
        
        let volatilePrice = Math.floor(comm.basePrice * volatility);
        
        // Clamp the price strictly within the min and max bounds
        if (comm.min !== undefined && volatilePrice < comm.min) volatilePrice = comm.min;
        if (comm.max !== undefined && volatilePrice > comm.max) volatilePrice = comm.max;
        
        currentMarketPrices[item] = volatilePrice;
    }
}

        function getPoiDescription(poi) {
            const descs = {
                "Trade Hub": `A massive central trading hub. Everything is available.`,
                "Wheat Farm": `Vast hydroponic bays provide grain for the sector.`,
                "Ice Mine": `Chucnks of asteroid are superheated heated to release precious water vapour. `,
                "Wheat Processing Plant": `Sterile corridors hum with food packaging machinery.`,
                "Livestock Farm": `Large biological containment bays. Smells terrible.`,
                "Meat Processing Plant": `You don't want to know how the sausage is made.`,
                "Metal Ore Refinery": `The deafening roar of smelting arrays echoes in the dark.`,
                "Machine Parts Factory": `Automated arms assemble components with precise rhythm.`,
                "Chip Fab": `Dust-free cleanrooms manufacture high-tech circuitry.`
            };
            return poi.description || descs[poi.type] || `A standard industrial outpost.`;
        }

        function checkExistingSave() {
            if (localStorage.getItem('spaceTraderSaveV4') && typeof galaxy !== 'undefined') {
                document.getElementById('btn-load-game').disabled = false;
            }
        }

        function startNewGame() {
            if (typeof galaxy === 'undefined') return alert("data.js missing!");
            player = { credits: 100, cargo: {}, cargoMax: 20 };
            currentSystem = galaxy[0];
            randomizeMarket(); // Initialize random prices
            document.getElementById('start-screen').style.display = 'none';
            switchTab('map'); 
            centerOnSystem(currentSystem);
        }

        function centerOnSystem(sys) {
            camera.x = (sys.x * drawScale * camera.zoom) - (canvas.clientWidth / 2);
            camera.y = (sys.y * drawScale * camera.zoom) - (canvas.clientHeight / 2);
            renderMap();
        }

        function saveGame() {
            localStorage.setItem('spaceTraderSaveV4', JSON.stringify({
                player, systemId: currentSystem.id, poiName: currentPoi?.name, jumpRange, currentMarketPrices
            }));
            const btn = document.getElementById('btn-save');
            btn.innerText = "SAVED!";
            setTimeout(() => btn.innerText = "SAVE", 1500);
        }

        function loadGame() {
            const data = JSON.parse(localStorage.getItem('spaceTraderSaveV4'));
            if (data && typeof galaxy !== 'undefined') {
                player = data.player;
                currentSystem = galaxy.find(s => s.id === data.systemId) || galaxy[0];
                currentPoi = currentSystem.pois.find(p => p.name === data.poiName) || null;
                jumpRange = data.jumpRange || 100;
                currentMarketPrices = data.currentMarketPrices || {};
                
                // Fallback in case loading an older save without market prices
                if(Object.keys(currentMarketPrices).length === 0) randomizeMarket(); 

                document.getElementById('start-screen').style.display = 'none';
                switchTab('map');
                centerOnSystem(currentSystem);
            }
        }

        function switchTab(tabId) {
            activeTab = tabId;
            localView = 'menu';
            ['map', 'local', 'ship', 'player'].forEach(id => {
                const el = document.getElementById(`tab-${id}`);
                const btn = document.getElementById(`btn-${id}`);
                if (el) el.style.display = (id === tabId) ? 'flex' : 'none';
                if (btn) btn.classList.toggle('tab-active', id === tabId);
            });
            if (tabId === 'map') renderMap();
            updateUI();
        }

        function setLocalView(view) {
            localView = view;
            updateUI();
        }

        function renderMap() {
            if (activeTab !== 'map' || typeof galaxy === 'undefined') return;
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            ctx.scale(camera.zoom, camera.zoom);
            const cx = currentSystem.x * drawScale;
            const cy = currentSystem.y * drawScale;
            ctx.beginPath();
            ctx.arc(cx, cy, jumpRange * drawScale, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0, 0, 0, 0.03)"; ctx.fill();
            ctx.strokeStyle = "#888888"; ctx.lineWidth = 2 / camera.zoom;
            ctx.setLineDash([5 / camera.zoom, 5 / camera.zoom]); ctx.stroke(); ctx.setLineDash([]);
            ctx.strokeStyle = "rgba(0, 0, 0, 0.15)";
            galaxy.forEach(star => {
                if (star.id !== currentSystem.id) {
                    const dist = Math.sqrt((currentSystem.x - star.x)**2 + (currentSystem.y - star.y)**2);
                    if (dist <= jumpRange) {
                        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(star.x * drawScale, star.y * drawScale); ctx.stroke();
                    }
                }
            });
            galaxy.forEach(star => {
                const sx = star.x * drawScale; const sy = star.y * drawScale;
                const dist = Math.sqrt((currentSystem.x - star.x)**2 + (currentSystem.y - star.y)**2);
                const inRange = dist <= jumpRange;
                ctx.fillStyle = (star.id === currentSystem.id) ? "#000000" : "#ffffff";
                ctx.strokeStyle = inRange ? "#000000" : "#777777";
                ctx.lineWidth = 2 / camera.zoom;
                ctx.beginPath(); ctx.arc(sx, sy, 8 / camera.zoom, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = inRange ? "#000000" : "#777777"; 
                ctx.font = `bold ${18 / camera.zoom}px Courier New`;
                ctx.fillText(star.name.toUpperCase(), sx + (18 / camera.zoom), sy + (6 / camera.zoom));
            });
            ctx.restore();
        }

function getMarketContext(itemName, price, view) {
            const comm = commodities[itemName];
            const base = comm.basePrice;
            
            // Fallbacks included just in case a commodity is missing min/max data
            const min = comm.min || (base * 0.6); 
            const max = comm.max || (base * 1.5);

            let arrow = "■", color = "text-gray-400";
            
            if (price > base) {
                // Calculate how far the price has climbed toward the maximum
                const ratio = (price - base) / (max - base);
                
                if (ratio >= 0.66) { arrow = "▲▲▲"; color = view === 'buy' ? "text-red-600" : "text-green-600"; }
                else if (ratio >= 0.33) { arrow = "▲▲"; color = view === 'buy' ? "text-red-600" : "text-green-600"; }
                else if (ratio > 0.05) { arrow = "▲"; color = view === 'buy' ? "text-red-600" : "text-green-600"; }
                
            } else if (price < base) {
                // Calculate how far the price has dropped toward the minimum
                const ratio = (base - price) / (base - min);
                
                if (ratio >= 0.66) { arrow = "▼▼▼"; color = view === 'buy' ? "text-green-600" : "text-red-600"; }
                else if (ratio >= 0.33) { arrow = "▼▼"; color = view === 'buy' ? "text-green-600" : "text-red-600"; }
                else if (ratio > 0.05) { arrow = "▼"; color = view === 'buy' ? "text-green-600" : "text-red-600"; }
            }

            return `<div class="flex items-center justify-center gap-1"><span class="text-sm opacity-50">${base}</span><span class="${color} font-bold text-xl">${arrow}</span></div>`;
        }

function getStationMarket(type) {
            const config = stationTypes[type];
            const market = { selling: [], buying: [] };

            if (!config) return market;

            // Items the station SELLS to the player (What it produces)
            if (config.produces) {
                config.produces.forEach(itemName => {
                    const base = currentMarketPrices[itemName] || commodities[itemName].basePrice;
                    
                    // Normal stations sell at a 20% discount. 
                    // Trade Hubs act as middlemen, only offering a 5% discount.
                    let discountMultiplier = 0.8; 
                    if (type === "Trade Hub") discountMultiplier = 0.95; 
                    
                    market.selling.push({ item: itemName, price: Math.floor(base * discountMultiplier) });
                });
            }

            // Items the station BUYS from the player (What it consumes)
            if (config.consumes) {
                Object.keys(config.consumes).forEach(itemName => {
                    const base = currentMarketPrices[itemName] || commodities[itemName].basePrice;
                    const demand = config.consumes[itemName];
                    
                    // Apply price multipliers based on how badly the station needs the item
                    let multiplier = 1.0; 
                    if (demand === "High") multiplier = 1.4;      
                    else if (demand === "Average") multiplier = 1.2; 
                    else if (demand === "TradeHub") multiplier = 1.05; // 5% markup
                    else if (demand === "Low") multiplier = 1.05;  

                    market.buying.push({ item: itemName, price: Math.ceil(base * multiplier) });
                });
            }

            return market;
        }

        function buyGood(itemName, price) {
            const total = Object.values(player.cargo).reduce((a, b) => a + b, 0);
            if (player.credits >= price && total < player.cargoMax) {
                player.credits -= price;
                player.cargo[itemName] = (player.cargo[itemName] || 0) + 1;
                updateUI();
            }
        }

        function sellGood(itemName, price) {
            if (player.cargo[itemName] > 0) {
                player.credits += price;
                player.cargo[itemName] -= 1;
                updateUI();
            }
        }

        function updateUI() {
            const total = Object.values(player.cargo).reduce((a, b) => a + b, 0);
            document.getElementById('status-credits').innerText = player.credits;
            document.getElementById('status-cargo').innerText = total;
            document.getElementById('status-cargo-max').innerText = player.cargoMax;
            document.getElementById('map-range-val').innerText = jumpRange;

            const localTab = document.getElementById('tab-local');
            if (!currentSystem) return;

            if (!currentPoi) {
                let html = `<h2 class="text-4xl font-bold uppercase">${currentSystem.name}</h2><p class="text-2xl font-bold uppercase text-gray-600 mb-6 border-b-2 border-black">Deep Space</p>`;
                currentSystem.pois.forEach((p, i) => html += `<button class="btn" onclick="triggerLocalTravel(${i})">${p.name.toUpperCase()} <br><span class="text-lg text-gray-600">(${p.type})</span></button>`);
                localTab.innerHTML = html;
            } else {
                let html = `<h2 class="text-4xl font-bold uppercase">${currentPoi.name}</h2><p class="text-xl font-bold uppercase text-gray-600 mb-4 border-b-2 border-black">Facility: ${currentPoi.type}</p>`;
                if (localView === 'menu') {
                    html += `<p class="text-xl mb-8 italic border-l-4 border-black pl-4 py-2 bg-gray-50">${getPoiDescription(currentPoi)}</p>`;
                    html += `<div class="space-y-4 max-w-md mx-auto">
                        <button class="btn" onclick="setLocalView('buy')">BUY COMMODITIES</button>
                        <button class="btn" onclick="setLocalView('sell')">SELL COMMODITIES</button>
                        <button class="btn !mt-12 bg-gray-200" onclick="triggerLocalTravel(-1)">UNDOCK</button>
                    </div>`;
                } else {
                    html += `<div class="flex justify-between items-center mb-6 border-b-2 border-black pb-2">
                        <h3 class="text-3xl font-bold uppercase">${localView}ING</h3>
                        <button class="btn !w-auto !mb-0 !py-2 !px-4 !text-xl" onclick="setLocalView('menu')">◀ BACK</button>
                    </div><div class="overflow-y-auto">`;
                    
                    const marketData = getStationMarket(currentPoi.type);
                    const activeMarket = localView === 'buy' ? marketData.selling : marketData.buying;
                    
                    html += `<div class="market-list-header"><span>Item</span><span class="text-center">Price</span><span class="text-center">Hold</span><span class="text-center">Avg</span><span class="text-center">Action</span></div>`;
                    
                    if (activeMarket.length === 0) {
                        html += `<p class="text-gray-500 italic mt-4">No goods available for ${localView}.</p>`;
                    } else {
                        activeMarket.forEach(m => {
                            const itemName = m.item;
                            const price = m.price;
                            const avg = commodities[itemName].basePrice; // Static comparison value
                            const qty = player.cargo[itemName] || 0;
                            const can = localView === 'buy' ? (player.credits >= price && total < player.cargoMax) : (qty > 0);
                            
                            html += `<div class="market-item">
                                <span class="text-sm sm:text-lg overflow-hidden text-ellipsis whitespace-nowrap" title="${itemName}">${itemName}</span>
                                <span class="text-center">${price}</span><span class="text-center">${qty}</span>
                                ${getMarketContext(itemName, price, localView)}
                                <button class="trade-btn" onclick="${localView}Good('${itemName}', ${price})" ${can ? '' : 'disabled'}>${localView.toUpperCase()}</button>
                            </div>`;
                        });
                    }
                    html += `</div>`;
                }
                localTab.innerHTML = html;
            }
            
            let cl = '';
            for (const [itemName, q] of Object.entries(player.cargo)) {
                if (q > 0) cl += `<div class="flex justify-between border-b border-gray-300 py-1"><span>${itemName}</span><span>${q} SCU</span></div>`;
            }
            document.getElementById('cargo-list').innerHTML = cl || '<p class="text-gray-500 italic">Empty.</p>';
            document.getElementById('ship-cargo-current').innerText = total;
            document.getElementById('player-credits').innerText = player.credits;
        }

        function triggerLocalTravel(i) {
            const dest = i === -1 ? null : currentSystem.pois[i];
            triggerTravel(dest, dest ? `APPROACHING ${dest.name}` : "DEPARTING STATION", 1000);
        }

        function triggerTravel(dest, msg, dur) {
            const ov = document.getElementById('travel-overlay');
            const bar = document.getElementById('progress-bar');
            document.getElementById('travel-text').innerText = msg;
            ov.style.display = 'flex';
            let start = Date.now();
            let t = setInterval(() => {
                let pc = ((Date.now() - start) / dur) * 100;
                bar.style.width = pc + "%";
                if (pc >= 100) { 
                    clearInterval(t); currentPoi = dest; ov.style.display = 'none'; updateUI(); if (activeTab === 'map') renderMap();
                }
            }, 30);
        }

        function handleDown(x, y) { isDragging = true; dragThreshold = false; lastMouse = { x, y }; }
        function handleMove(x, y) {
            if (!isDragging || activeTab !== 'map') return;
            let dx = x - lastMouse.x, dy = y - lastMouse.y;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragThreshold = true;
            camera.x -= dx; camera.y -= dy; lastMouse = { x, y }; renderMap();
        }
        function handleUp(x, y) {
            if (!isDragging || activeTab !== 'map') return;
            isDragging = false;
            if (!dragThreshold) {
                const r = canvas.getBoundingClientRect();
                const wx = ((x - r.left) + camera.x) / camera.zoom, wy = ((y - r.top) + camera.y) / camera.zoom;
                galaxy.forEach(s => {
                    const d = Math.sqrt((wx - s.x * drawScale)**2 + (wy - s.y * drawScale)**2);
                    if (d < 20 / camera.zoom && s.id !== currentSystem.id) {
                        if (Math.sqrt((currentSystem.x - s.x)**2 + (currentSystem.y - s.y)**2) <= jumpRange) {
                            currentSystem = s; 
                            centerOnSystem(s); 
                            randomizeMarket(); // Market fluctuates when jumping to a new star
                            triggerTravel(null, `WARPING TO ${s.name}`, 2500);
                        }
                    }
                });
            }
        }
        canvas.addEventListener('wheel', e => {
            if (activeTab !== 'map') return; e.preventDefault();
            const r = canvas.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            const wx = (mx + camera.x) / camera.zoom, wy = (my + camera.y) / camera.zoom;
            camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1); camera.zoom = Math.min(Math.max(camera.zoom, 0.2), 3);
            camera.x = (wx * camera.zoom) - mx; camera.y = (wy * camera.zoom) - my; renderMap();
        }, { passive: false });
        canvas.addEventListener('mousedown', e => handleDown(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', e => handleUp(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 2) initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            else handleDown(e.touches[0].clientX, e.touches[0].clientY);
        });
        canvas.addEventListener('touchmove', e => {
            if (activeTab !== 'map') return; e.preventDefault();
            if (e.touches.length === 2 && initialPinchDistance) {
                const cur = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2, midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const wx = (midX + camera.x) / camera.zoom, wy = (midY + camera.y) / camera.zoom;
                camera.zoom *= (cur / initialPinchDistance); camera.zoom = Math.min(Math.max(camera.zoom, 0.2), 3);
                camera.x = (wx * camera.zoom) - midX; camera.y = (wy * camera.zoom) - midY;
                initialPinchDistance = cur; renderMap();
            } else handleMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        canvas.addEventListener('touchend', e => { initialPinchDistance = null; if (e.changedTouches.length) handleUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY); });
        window.addEventListener('resize', renderMap);
        checkExistingSave();
    </script>
</body>
</html>
